# Build and publish anndataoom wheels.
#
# On tag push (v*.*.*): builds wheels for multiple platforms and publishes
# them to PyPI via trusted publishing (OIDC — no API token needed).
#
# Requires: in PyPI, register 'anndataoom' under a trusted publisher pointing to
# this repo + this workflow file. See https://docs.pypi.org/trusted-publishers/
#
# Currently built: Linux x86_64 · macOS x86_64 · macOS arm64
# Not yet: Linux aarch64 (ring ARM cross-compile fails), Windows (HDF5 CMake).

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "python/**"
      - "Cargo.toml"
      - "pyproject.toml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Linux x86_64 (manylinux)
  # aarch64 temporarily disabled — `ring` crate fails to cross-compile
  # (ARM asm needs explicit __ARM_ARCH in containerised builds).
  # ──────────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────────────────────────────
  # macOS x86_64 + arm64
  # ──────────────────────────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────────────────────────────
  # Windows x86_64 (enabled in 0.1.8). The vendored anndata-rs builds a
  # static HDF5 from source via CMake; the `threadsafe` feature is gated
  # off on Windows (vendor/anndata-rs/anndata-hdf5/Cargo.toml) because
  # HDF5's CMake refuses thread-safety with a static library there.
  # ──────────────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────────────────────────────
  # Source distribution
  # ──────────────────────────────────────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ──────────────────────────────────────────────────────────────────────
  # Publish to PyPI (only on tag pushes)
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/anndataoom
    permissions:
      id-token: write   # For trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # trusted publisher — no token needed
