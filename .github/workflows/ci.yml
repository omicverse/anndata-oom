# Cross-platform test CI for anndataoom.
#
# release.yml only *builds* wheels; this workflow additionally *runs the
# test suite* on Linux / macOS / Windows across supported Python versions,
# so we know which platforms anndataoom actually works on (not just builds
# on). The Rust extension is compiled from source via the maturin PEP-517
# backend (`pip install .`), which needs a Rust toolchain + HDF5.
#
# fail-fast: false so one platform failing still reports the others — the
# matrix result *is* the platform-support answer. Windows historically
# fails at the hdf5-metno-src CMake step (see release.yml); this workflow
# attempts a vcpkg-provided HDF5 to give it a fair chance and records the
# outcome either way.

name: CI

on:
  push:
    branches: [main, "chore/**", "feat/**", "fix/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel) GitHub-hosted runners are deprecated and queue
        # then cancel/timeout; macos-14 (ARM) covers macOS test coverage and
        # release.yml still builds the macos x86_64 wheel via cibuildwheel.
        os: [ubuntu-latest, macos-14, windows-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # No system HDF5 needed: the vendored anndata-rs builds a static HDF5
      # from source via the `hdf5-metno-sys` `static` feature (CMake, which
      # all runners ship). On Windows the `threadsafe` feature is gated off
      # (vendor/anndata-rs/anndata-hdf5/Cargo.toml) so the static HDF5 CMake
      # build succeeds. CMake is preinstalled on the GitHub-hosted runners.

      - name: Build + install anndataoom (PEP-517, compiles Rust ext + vendored HDF5)
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Install test dependencies
        run: pip install pytest scanpy scikit-learn

      - name: Show environment
        run: |
          python -c "import anndataoom as o; print('anndataoom', o.__version__, o.__file__)"
          python -c "import sys; print('python', sys.version)"

      - name: Run test suite
        run: pytest -v tests/
